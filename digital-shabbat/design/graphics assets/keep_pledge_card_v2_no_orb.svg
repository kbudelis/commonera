<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="pledge-card-title pledge-card-desc">
  <title id="pledge-card-title">Keep pledge card composition, no orb alternate</title>
  <desc id="pledge-card-desc">An alternate composition template for the dynamic pledge card without the ritual orb. Bind user words to the border and arch paths in production.</desc>
  <defs>
    <filter id="card-grain" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="11" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.13 0 0 0 0 0.09 0 0 0 0.05 0" />
    </filter>
    <filter id="card-gold-glow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.88 0 0 0 0 0.64 0 0 0 0 0.26 0 0 0 0.32 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="card-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F0E7" />
      <stop offset="0.58" stop-color="#F1EADC" />
      <stop offset="1" stop-color="#E8DECB" />
    </linearGradient>
    <radialGradient id="card-illumination" cx="50%" cy="52%" r="42%">
      <stop offset="0" stop-color="#E8BC60" stop-opacity="0.16" />
      <stop offset="0.48" stop-color="#E8BC60" stop-opacity="0.06" />
      <stop offset="1" stop-color="#E8BC60" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="open-center" cx="50%" cy="48%" r="42%">
      <stop offset="0" stop-color="#F4F0E7" stop-opacity="0.34" />
      <stop offset="0.52" stop-color="#F4F0E7" stop-opacity="0.12" />
      <stop offset="1" stop-color="#F4F0E7" stop-opacity="0" />
    </radialGradient>
    <path id="micrography-border-path" d="M128 92H1072A36 36 0 0 1 1108 128V1472A36 36 0 0 1 1072 1508H128A36 36 0 0 1 92 1472V128A36 36 0 0 1 128 92Z" fill="none" />
    <path id="micrography-arch-path" d="M236 1120V620A364 364 0 0 1 964 620V1120" fill="none" />
  </defs>
  <rect width="1200" height="1600" rx="36" fill="url(#card-paper)" />
  <rect width="1200" height="1600" rx="36" fill="url(#card-illumination)" />
  <rect width="1200" height="1600" rx="36" filter="url(#card-grain)" opacity="0.9" />
  <path d="M128 92H1072A36 36 0 0 1 1108 128V1472A36 36 0 0 1 1072 1508H128A36 36 0 0 1 92 1472V128A36 36 0 0 1 128 92Z" fill="none" stroke="#2B2118" stroke-width="1.1" opacity="0.24" />
  <path d="M252 1120V620A348 348 0 0 1 948 620V1120" fill="none" stroke="#C99A43" stroke-width="1.5" opacity="0.62" />
  <path d="M268 1120V620A332 332 0 0 1 932 620V1120" fill="none" stroke="#C99A43" stroke-width="0.8" opacity="0.34" />
  <path d="M294 1120V620A306 306 0 0 1 906 620V1120" fill="none" stroke="#2B2118" stroke-width="0.6" opacity="0.12" />
  <ellipse cx="600" cy="650" rx="268" ry="286" fill="url(#open-center)" />
  <g opacity="0.32">
    <use href="#micrography-border-path" stroke="#2B2118" stroke-width="13" stroke-dasharray="2 11" stroke-linecap="round" fill="none" />
    <use href="#micrography-arch-path" stroke="#C99A43" stroke-width="9" stroke-dasharray="1.4 10" stroke-linecap="round" fill="none" />
  </g>
  <g filter="url(#card-gold-glow)" transform="translate(520 336)">
    <circle cx="32" cy="28" r="5.4" fill="#E5BD63" opacity="0.72" />
    <circle cx="80" cy="16.2" r="6.4" fill="#E5BD63" opacity="0.86" />
    <circle cx="128" cy="28" r="5.4" fill="#E5BD63" opacity="0.72" />
  </g>
  <line x1="472" x2="728" y1="1396" y2="1396" stroke="#C99A43" stroke-width="1.2" opacity="0.7" />
  <circle cx="600" cy="1448" r="7" fill="#2B2118" opacity="0.32" />
  <circle cx="572" cy="1448" r="3.5" fill="#2B2118" opacity="0.22" />
  <circle cx="628" cy="1448" r="3.5" fill="#2B2118" opacity="0.22" />
</svg>
