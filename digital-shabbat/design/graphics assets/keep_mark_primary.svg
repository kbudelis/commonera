<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="keep-mark-title keep-mark-desc">
  <title id="keep-mark-title">Keep primary mark</title>
  <desc id="keep-mark-desc">An abstract boundary and held-light mark for Keep. Set color with CSS currentColor.</desc>
  <defs>
    <filter id="keep-mark-soft-gold" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.6" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.87 0 0 0 0 0.62 0 0 0 0 0.24 0 0 0 0.42 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    svg { color: #2B2118; }
    .line { fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
    .outer { stroke-width: 4.2; }
    .inner { stroke-width: 2.2; opacity: 0.82; }
    .light { color: #F4F0E7; }
    .gold { color: #E2B95C; filter: url(#keep-mark-soft-gold); }
  </style>
  <path class="line outer" d="M47.6 14.8C40.1 7.8 27.8 7 19.2 13.8 9.2 21.6 7.6 36.1 15.5 46.1c7.5 9.5 20.9 11.6 31 5.2" />
  <path class="line outer" d="M45.4 50.4c6.4-4.5 9.2-12.5 7.8-20" />
  <path class="line inner" d="M31.8 18.2c6.2 4.5 9.4 9.3 9.4 14.2 0 5.7-4.3 10.1-9.4 13.4-5.1-3.3-9.3-7.7-9.3-13.4 0-4.9 3.1-9.7 9.3-14.2Z" />
</svg>
